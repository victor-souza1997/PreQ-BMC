name: tests

on:
  push:
  pull_request:

jobs:
  lightweight:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: python -m pip install -e .

      - name: Verify environment report
        run: preqbmc verify-environment

      - name: Run no-solver unit tests
        run: |
          python -m unittest \
            tool.tests.test_c_qnn_generation \
            tool.tests.test_fixed_point_forward \
            tool.tests.test_no_saturation_verification
